<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimLife</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --border: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8899aa;
  --accent: #e94560;
  --mood-good: #4ecca3;
  --mood-mid: #f0c040;
  --mood-bad: #e94560;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Microsoft YaHei UI', 'PingFang SC', -apple-system, sans-serif;
  font-size: 13px;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 顶栏 */
#top-bar {
  height: 40px;
  background: linear-gradient(180deg, #1e2a45, var(--surface));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 12px;
  color: var(--text-dim);
  gap: 16px;
  flex-shrink: 0;
}
#top-bar .city { color: var(--text); font-weight: bold; font-size: 13px; }
#top-bar .weather { font-size: 16px; }
#top-bar .time { font-variant-numeric: tabular-nums; color: var(--text); font-size: 13px; }

/* 主画面 */
#game-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a15;
  min-height: 0;
  position: relative;
}
#game-canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  width: 960px;
  height: 540px;
  max-width: calc(100vw - 24px);
  max-height: calc(100vh - 200px);
  border-radius: 4px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* 状态栏 */
#status-bar {
  height: 52px;
  background: linear-gradient(180deg, var(--surface), #12192e);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}
#mood-emoji { font-size: 20px; }
#mood-bar-wrap {
  width: 140px;
  height: 16px;
  background: #0a0a15;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.05);
}
#mood-bar {
  height: 100%;
  width: 70%;
  background: var(--mood-good);
  transition: width 1s ease, background 1s ease;
  border-radius: 8px;
  position: relative;
}
#mood-bar::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
  border-radius: 8px 8px 0 0;
}
#mood-value {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 36px;
}
#scene-tag {
  padding: 2px 10px;
  background: rgba(233,69,96,0.15);
  color: var(--accent);
  border-radius: 10px;
  font-size: 11px;
  border: 1px solid rgba(233,69,96,0.2);
}
#freeze-indicator {
  display: none;
  padding: 2px 8px;
  background: rgba(52,211,153,0.15);
  color: #4ecca3;
  border-radius: 10px;
  font-size: 11px;
  margin-left: 6px;
  border: 1px solid rgba(52,211,153,0.2);
}
#freeze-indicator.show { display: inline-block; }
#activity-text {
  color: var(--text-dim);
  font-size: 13px;
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* 日志面板 */
#log-panel {
  height: 160px;
  background: linear-gradient(180deg, #12192e, var(--surface));
  overflow-y: auto;
  padding: 8px 16px;
  flex-shrink: 0;
}
#log-panel .log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-dim);
  position: sticky;
  top: 0;
  background: #12192e;
  padding: 4px 0;
  z-index: 1;
}
#log-panel .log-header button {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-dim);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s;
}
#log-panel .log-header button:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}
.log-item {
  padding: 4px 0;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  animation: logFadeIn 0.3s ease;
}
@keyframes logFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.log-item .log-time {
  color: var(--accent);
  opacity: 0.7;
  flex-shrink: 0;
  width: 42px;
  font-variant-numeric: tabular-nums;
}
.log-item .log-event { color: var(--text); line-height: 1.5; }
#log-panel::-webkit-scrollbar { width: 4px; }
#log-panel::-webkit-scrollbar-track { background: transparent; }
#log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 设置面板 (overlay) */
#setup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}
#setup-panel {
  background: linear-gradient(160deg, #1e2a45, var(--surface));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 440px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#setup-panel h2 {
  font-size: 20px;
  margin-bottom: 8px;
  color: var(--text);
}
#setup-panel .subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 20px;
  line-height: 1.6;
}
#setup-panel .field {
  margin-bottom: 14px;
}
#setup-panel label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 5px;
}
#setup-panel input, #setup-panel select {
  width: 100%;
  padding: 10px 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  transition: border-color 0.2s;
}
#setup-panel input:focus, #setup-panel select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(233,69,96,0.15);
}
#setup-panel .btn-row {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}
#setup-panel button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
#btn-generate {
  background: linear-gradient(135deg, var(--accent), #c73050);
  color: white;
  font-weight: bold;
}
#btn-generate:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(233,69,96,0.3); }
#btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
#btn-skip {
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
#btn-skip:hover { background: rgba(255,255,255,0.1); color: var(--text); }
#setup-status {
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-dim);
  min-height: 20px;
}

/* NPC气泡 */
.npc-bubble {
  position: absolute;
  background: rgba(255,255,255,0.95);
  color: #333;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 11px;
  max-width: 100px;
  pointer-events: none;
  animation: bubbleIn 0.3s ease;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 用户入驻按钮 */
#user-enter-btn {
  padding: 4px 14px;
  background: rgba(78, 204, 163, 0.15);
  border: 1px solid rgba(78, 204, 163, 0.3);
  color: var(--mood-good);
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
#user-enter-btn:hover {
  background: rgba(78, 204, 163, 0.25);
  border-color: var(--mood-good);
}
#user-enter-btn.entered {
  background: rgba(233, 69, 96, 0.15);
  border-color: rgba(233, 69, 96, 0.3);
  color: var(--accent);
}
#user-enter-btn.entered:hover {
  background: rgba(233, 69, 96, 0.25);
}

/* 齿轮设置按钮 */
#settings-btn {
  padding: 4px 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-dim);
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
}
#settings-btn:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

/* 设置下拉菜单 */
#settings-menu {
  display: none;
  position: absolute;
  top: 42px;
  right: 16px;
  background: #1e2a45;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 0;
  min-width: 180px;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
#settings-menu.show { display: block; }
#settings-menu button {
  display: block;
  width: 100%;
  padding: 10px 16px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 13px;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s;
}
#settings-menu button:hover { background: rgba(255,255,255,0.06); }
#settings-menu button.danger { color: var(--accent); }
#settings-menu button.danger:hover { background: rgba(233,69,96,0.1); }
#settings-menu .menu-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* 用户设置弹窗 */
#user-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#user-panel {
  background: linear-gradient(160deg, #1e2a45, var(--surface));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 400px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#user-panel h2 { font-size: 18px; margin-bottom: 6px; color: var(--text); }
#user-panel .subtitle { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
#user-panel .field { margin-bottom: 14px; }
#user-panel label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
#user-panel input, #user-panel select {
  width: 100%;
  padding: 10px 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  transition: border-color 0.2s;
}
#user-panel input:focus, #user-panel select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(233,69,96,0.15);
}
#user-panel .btn-row { margin-top: 20px; display: flex; gap: 10px; }
#user-panel button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
#btn-user-enter {
  background: linear-gradient(135deg, var(--mood-good), #3aaa88);
  color: white;
  font-weight: bold;
}
#btn-user-enter:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(78,204,163,0.3); }
#btn-user-leave {
  background: linear-gradient(135deg, var(--accent), #c73050);
  color: white;
  font-weight: bold;
}
#btn-user-leave:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(233,69,96,0.3); }
#btn-user-cancel {
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
#btn-user-cancel:hover { background: rgba(255,255,255,0.1); color: var(--text); }

/* 用户状态指示器 */
#user-status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #555;
  margin-right: 4px;
  vertical-align: middle;
  transition: background 0.3s;
}
#user-status-dot.active {
  background: var(--mood-good);
  box-shadow: 0 0 6px rgba(78,204,163,0.5);
}

/* 加载 */
#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 14px;
}
</style>
</head>
<body>

<!-- 设置面板 -->
<div id="setup-overlay">
  <div id="setup-panel">
    <h2>🌱 SimLife 初始设置</h2>
    <p class="subtitle">为你的 AI 角色创建一个生活世界。填入基本信息，AI 会补全其余细节。</p>
    <div class="field">
      <label>🌍 世界观</label>
      <select id="inp-world" onchange="onWorldChange()">
        <option value="modern">🏢 现代都市（默认）</option>
        <option value="__ai_generate">🤖 AI 生成自定义世界…</option>
        <option value="__import">📋 导入世界观 JSON…</option>
      </select>
    </div>
    <div id="world-info-bar" style="display:none;margin-bottom:14px;padding:10px 12px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-dim);line-height:1.5;">
    </div>
    <div id="modern-fields">
      <div class="field">
        <label>角色名字（从 AGI-DPA 读取，可留空）</label>
        <input id="inp-name" placeholder="如：小雪" value="">
      </div>
      <div class="field">
        <label>所在城市</label>
        <select id="inp-city">
          <option value="上海">上海</option>
          <option value="北京">北京</option>
          <option value="深圳">深圳</option>
          <option value="杭州">杭州</option>
          <option value="成都">成都</option>
          <option value="广州">广州</option>
          <option value="南京">南京</option>
          <option value="武汉">武汉</option>
          <option value="random">🤖 AI 随机选择</option>
        </select>
      </div>
      <div class="field">
        <label>职业</label>
        <input id="inp-occupation" placeholder="如：UI设计师" value="UI设计师">
      </div>
      <div class="field">
        <label>年龄</label>
        <input id="inp-age" type="number" value="24" min="18" max="40">
      </div>
      <div class="field">
        <label>性格关键词</label>
        <input id="inp-personality" placeholder="如：慵懒但精致" value="慵懒但精致">
      </div>
    </div>
    <!-- 非现代世界：简化角色字段 -->
    <div id="custom-world-fields" style="display:none;">
      <div class="field">
        <label>角色名字</label>
        <input id="inp-name-cw" placeholder="如：艾拉" value="">
      </div>
      <div class="field">
        <label>职业 / 身份</label>
        <input id="inp-occupation-cw" placeholder="如：初级魔法师、冒险者、机甲驾驶员" value="">
      </div>
      <div class="field">
        <label>年龄</label>
        <input id="inp-age-cw" type="number" value="24" min="14" max="200">
      </div>
      <div class="field">
        <label>性格关键词</label>
        <input id="inp-personality-cw" placeholder="如：热血、好奇心强" value="">
      </div>
    </div>
    <!-- AI 生成世界观面板 -->
    <div id="ai-gen-world-panel" style="display:none;">
      <div class="field">
        <label>世界类型</label>
        <select id="inp-ai-world-type">
          <option value="fantasy">🗡️ 奇幻魔法</option>
          <option value="scifi">🚀 科幻未来</option>
          <option value="xianxia">⛩️ 仙侠修真</option>
          <option value="post_apocalyptic">☢️ 末世废土</option>
          <option value="custom">🌈 完全自定义</option>
        </select>
      </div>
      <div class="field">
        <label>核心主题 / 想法（可选）</label>
        <input id="inp-ai-world-theme" placeholder="如：类似原神的提瓦特大陆、刀剑神域VRMMO、巨兽背上的世界…" value="">
      </div>
      <div class="field">
        <label>角色在这个世界的身份（可选）</label>
        <input id="inp-ai-world-role" placeholder="如：冒险者、星纹师、机甲猎人" value="">
      </div>
      <button onclick="doAIGenerateWorld()" style="width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:bold;margin-bottom:14px;">🧙 AI 生成世界观设定（约 30-60 秒）</button>
    </div>
    <!-- 导入世界观面板 -->
    <div id="import-world-panel" style="display:none;">
      <div class="field">
        <label>粘贴世界观 JSON</label>
        <textarea id="inp-import-json" rows="6" placeholder="将 LLM 生成的 world_setting JSON 粘贴到这里…" style="width:100%;padding:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;resize:vertical;font-family:monospace;"></textarea>
      </div>
      <button onclick="doImportWorld()" style="width:100%;padding:12px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:bold;margin-bottom:14px;">📋 导入并使用</button>
    </div>
    <div class="btn-row">
      <button id="btn-skip" onclick="skipSetup()">跳过</button>
      <button id="btn-generate" onclick="generateWorld()">✨ 开始生成</button>
    </div>
    <div id="setup-status"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="main-ui" style="display:none;flex-direction:column;height:100vh;">
  <div id="top-bar">
    <span class="city" id="disp-city">上海</span>
    <span id="disp-weekday">周六</span>
    <span class="time" id="disp-time">14:30</span>
    <span class="weather" id="disp-weather">⛅</span>
    <span id="scene-tag">晚间放松</span><span id="freeze-indicator">⏸ 场景冻结</span>
    <span style="flex:1;"></span>
    <button id="user-enter-btn" onclick="toggleUserPanel()">🏠 进入世界</button>
    <button id="settings-btn" onclick="toggleSettingsMenu()">⚙️</button>
    <div id="settings-menu">
      <button onclick="openSetupForReinit()">🔄 重新初始化角色</button>
      <button onclick="openUserPanelFromMenu()">🏠 设置我的身份</button>
      <div class="menu-divider"></div>
      <button class="danger" onclick="doResetSimLife()">🗑️ 重置 SimLife（清空所有数据）</button>
    </div>
  </div>

  <div id="game-area">
    <canvas id="game-canvas" width="640" height="360"></canvas>
  </div>

  <div id="status-bar">
    <span id="mood-emoji">🙂</span>
    <div id="mood-bar-wrap">
      <div id="mood-bar"></div>
    </div>
    <span id="mood-value">87</span>
    <span id="activity-text">在改设计稿的细节</span>
  </div>

  <div id="log-panel">
    <div class="log-header">
      <span>📋 今日动态</span>
      <button onclick="toggleAllLogs()">全部</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<!-- 用户入驻设置弹窗 -->
<div id="user-overlay">
  <div id="user-panel">
    <h2>🏠 你的身份</h2>
    <p class="subtitle">设置你在 SimLife 世界中的身份。设置后点击「进入世界」，角色就会知道你的存在。</p>
    <div class="field">
      <label>你的名字</label>
      <input id="inp-user-name" placeholder="如：小明（可留空）" value="">
    </div>
    <div class="field">
      <label>你和角色的关系 *</label>
      <input id="inp-user-relation" placeholder="如：男朋友、女朋友、室友、朋友…" value="">
    </div>
    <div class="field">
      <label>你在世界中的身份（可选）</label>
      <input id="inp-user-role" placeholder="如：每天下班来找她、周末一起逛街的搭档" value="">
    </div>
    <div class="btn-row" id="user-btn-row">
      <button id="btn-user-cancel" onclick="closeUserPanel()">取消</button>
      <button id="btn-user-leave" onclick="doUserLeave()" style="display:none;">🚪 离开世界</button>
      <button id="btn-user-enter" onclick="doUserEnter()">✨ 进入世界</button>
    </div>
  </div>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }
  #vrm-container {
    width: 100%; height: 100%;
    position: relative;
    background: transparent;
  }
  #vrm-canvas {
    width: 100%; height: 100%;
    display: block;
    filter: drop-shadow(0 0 8px rgba(0,212,255,0.35))
            drop-shadow(0 0 20px rgba(0,212,255,0.15));
  }
  .scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.03) 2px,
      rgba(0,212,255,0.03) 4px
    );
    pointer-events: none;
    opacity: 0.6;
  }
  .status-bar {
    position: absolute;
    bottom: 4px; left: 8px; right: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00D4FF;
    box-shadow: 0 0 4px #00D4FF;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-label {
    color: rgba(0,212,255,0.5);
    font-family: 'Consolas', monospace;
    font-size: 9px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  #loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(0,212,255,0.4);
    font-family: 'Consolas', monospace;
    font-size: 10px;
    text-align: center;
    line-height: 1.8;
    pointer-events: none;
  }
  #loading.hidden { display: none; }
  #error-panel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,100,100,0.7);
    font-family: 'Consolas', monospace;
    font-size: 10px;
    text-align: center;
    line-height: 1.8;
    display: none;
  }
</style>

<!-- ES Module import map: 本地文件优先，CDN 兜底 -->
<script type="importmap">
{
  "imports": {
    "three": "./three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "@pixiv/three-vrm": "./three-vrm.module.js",
    "@pixiv/three-vrm-core": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-core@2.1.0/lib/three-vrm-core.module.js",
    "@pixiv/three-vrm-materials-mtoon": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-materials-mtoon@2.1.0/lib/three-vrm-materials-mtoon.module.js"
  }
}
</script>
</head>
<body>
<div id="vrm-container">
  <canvas id="vrm-canvas"></canvas>
  <div class="scanlines"></div>
  <div id="loading">
    VRM INIT<br>
    <span id="load-status">初始化渲染引擎</span>
  </div>
  <div id="error-panel">
    <span id="error-text"></span>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-label" id="emotion-label">IDLE</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

let scene, camera, renderer, clock;
let vrm = null;
let targetEmotion = { name: "neutral", intensity: 1.0 };
let currentEmotion = { name: "neutral", intensity: 1.0 };
let speaking = false;
let blinkTimer = 0;
let nextBlinkTime = 3 + Math.random() * 3;

const loadStatus = document.getElementById("load-status");
const loadingEl = document.getElementById("loading");
const errorPanel = document.getElementById("error-panel");
const errorText = document.getElementById("error-text");
const emotionLabel = document.getElementById("emotion-label");

function showError(msg) {
  loadingEl.classList.add("hidden");
  errorPanel.style.display = "block";
  errorText.innerHTML = msg;
}

// ── 1. 场景初始化 ──
function initScene() {
  const canvas = document.getElementById("vrm-canvas");
  const container = document.getElementById("vrm-container");
  const w = container.clientWidth || 220;
  const h = container.clientHeight || 220;

  scene = new THREE.Scene();
  clock = new THREE.Clock();

  renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    alpha: true,
    antialias: true,
  });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  camera = new THREE.PerspectiveCamera(25, w / h, 0.1, 20);
  camera.position.set(0, 1.35, 1.0);
  camera.lookAt(0, 1.3, 0);

  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(1, 2, 1);
  scene.add(dir);
  const bottom = new THREE.PointLight(0x00D4FF, 0.3, 5);
  bottom.position.set(0, 0.3, 0.5);
  scene.add(bottom);

  window.addEventListener("resize", onResize);
}

function onResize() {
  const container = document.getElementById("vrm-container");
  const w = container.clientWidth || 220;
  const h = container.clientHeight || 220;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

// ── 2. VRM 加载 ──
async function loadVRM() {
  loadStatus.textContent = "加载 VRM 模型";
  try {
    const response = await fetch("model.vrm");
    if (!response.ok) throw new Error("HTTP " + response.status);
    const arrayBuffer = await response.arrayBuffer();

    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    const gltf = await new Promise((resolve, reject) => {
      loader.parse(arrayBuffer, "", resolve, reject);
    });

    vrm = gltf.userData.vrm;
    window.vrm = vrm;
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    VRMUtils.rotateVRM0(vrm);

    vrm.scene.traverse((obj) => {
      if (obj.material) {
        obj.material.transparent = true;
        obj.material.opacity = 0.92;
      }
    });

    scene.add(vrm.scene);
    loadingEl.classList.add("hidden");
    console.log("[VRM] 模型加载成功");
  } catch (e) {
    console.warn("[VRM] 模型加载失败:", e.message);
    loadStatus.innerHTML = "模型加载失败: " + e.message + "<br>5秒后重试...";
    setTimeout(loadVRM, 5000);
  }
}

// ── 3. 表情控制 API ──
// 查找表情：大小写不敏感匹配
function findExpression(name) {
  if (!vrm || !vrm.expressionManager) return false;
  const expressions = vrm.expressionManager.expressions;
  const found = expressions.find(e => e.expressionName.toLowerCase() === name.toLowerCase());
  return found ? found.expressionName : false;
}

window.setEmotion = function(name, intensity) {
  targetEmotion = { name: name, intensity: Math.max(0, Math.min(1, intensity)) };
  emotionLabel.textContent = name.toUpperCase();
};

window.setSpeaking = function(isSpeaking) {
  speaking = !!isSpeaking;
  emotionLabel.textContent = speaking ? "SPEAKING" : (targetEmotion.name || "IDLE").toUpperCase();
};

// ── 4. 动画循环 ──
function animate() {
  requestAnimationFrame(animate);
  if (!renderer) return;
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  if (!vrm) {
    renderer.render(scene, camera);
    return;
  }

  const lerpSpeed = 0.08;
  currentEmotion.intensity += (targetEmotion.intensity - currentEmotion.intensity) * lerpSpeed;
  if (currentEmotion.name !== targetEmotion.name) {
    currentEmotion.intensity *= 0.9;
    if (currentEmotion.intensity < 0.05) {
      currentEmotion.name = targetEmotion.name;
    }
  }

  if (vrm.expressionManager) {
    ["happy","sad","angry","surprised","relaxed","neutral"].forEach((e) => {
      const matched = findExpression(e);
      if (matched) {
        const val = (e === currentEmotion.name) ? currentEmotion.intensity : 0;
        vrm.expressionManager.setValue(matched, val);
      }
    });
  }

  if (vrm.humanoid) {
    const breathBone = vrm.humanoid.getNormalizedBoneNode("spine");
    if (breathBone) {
      breathBone.position.y = Math.sin(t * 0.8) * 0.008;
    }
    const head = vrm.humanoid.getNormalizedBoneNode("head");
    if (head) {
      head.rotation.y = Math.sin(t * 0.3) * 0.02;
      if (speaking) {
        head.rotation.x = Math.sin(t * 4) * 0.015;
      } else {
        head.rotation.x *= 0.95;
      }
    }
  }

  blinkTimer += dt;
  if (blinkTimer >= nextBlinkTime && vrm.expressionManager) {
    vrm.expressionManager.setValue("blink", 1.0);
    blinkTimer = 0;
    nextBlinkTime = 3 + Math.random() * 3;
    setTimeout(() => {
      if (vrm && vrm.expressionManager) {
        vrm.expressionManager.setValue("blink", 0);
      }
    }, 150);
  }

  if (vrm.update) vrm.update(dt);
  renderer.render(scene, camera);
}

// ── 5. 启动 ──
if (location.protocol === "file:") {
  showError(
    "file:// 协议无法加载模型<br><br>" +
    "请运行测试服务:<br>" +
    "python vrm_module/test_server.py<br><br>" +
    "或直接启动主程序测试"
  );
} else {
  initScene();
  animate();
  loadVRM();
}
</script>
</body>
</html>
